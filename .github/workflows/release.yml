name: Release Library

on:
  workflow_dispatch:

jobs:
  release:
    name: Build And Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ---------------------------------------------------------
      # Checkout repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Setup Java 11
      # ---------------------------------------------------------
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # ---------------------------------------------------------
      # Setup Gradle caching
      # ---------------------------------------------------------
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---------------------------------------------------------
      # Grant gradlew permission
      # ---------------------------------------------------------
      - name: Grant execute permission
        run: chmod +x gradlew

      # ---------------------------------------------------------
      # Build library
      # ---------------------------------------------------------
      - name: Build project
        run: ./gradlew clean build publishToMavenLocal

      # ---------------------------------------------------------
      # Generate next version
      # Existing latest release = v1.0.6
      # First workflow run -> v1.0.7
      # ---------------------------------------------------------
      - name: Generate version
        id: version
        run: |
          VERSION=v1.0.$((6 + ${{ github.run_number }}))
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Create and push git tag
      # ---------------------------------------------------------
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      # ---------------------------------------------------------
      # Create GitHub Release
      # ---------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

      # ---------------------------------------------------------
      # Final output
      # ---------------------------------------------------------
      - name: Release summary
        run: |
          echo "Released version: ${{ steps.version.outputs.version }}"